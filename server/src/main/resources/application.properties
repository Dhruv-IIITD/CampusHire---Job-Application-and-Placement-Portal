spring.application.name=campushire-server

spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:campushire;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=${JWT_SECRET:campushire-campus-placement-portal-jwt-secret-key-2026}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
